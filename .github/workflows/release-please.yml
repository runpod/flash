name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

env:
  PYTHON_VERSION: '3.11'

jobs:
  # Quality is enforced by CI on PRs via branch protection -- the code that
  # reached main has already passed the full matrix. Re-running it here would
  # duplicate ~24 min of compute per merge for zero added signal.
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Run Release Please
        uses: google-github-actions/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}

  pypi-publish:
    name: PyPI Publish
    runs-on: ubuntu-latest
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}

    environment:
      name: pypi-production
      url: https://pypi.org/project/runpod-flash/

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Build package
        run: make build

      - name: Verify package
        run: uv run twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
